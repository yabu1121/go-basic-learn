version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: golearn_postgres
    environment:
      POSTGRES_USER: gouser
      POSTGRES_PASSWORD: gopass
      POSTGRES_DB: golearn_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gouser"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: golearn_api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: gouser
      DB_PASSWORD: gopass
      DB_NAME: golearn_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: go run main.go

volumes:
  postgres_data:
